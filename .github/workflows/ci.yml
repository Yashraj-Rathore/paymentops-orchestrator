name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate Compose
        run: docker compose config

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run payout orchestration test
        run: pnpm test:e2e

      - name: Upload Compose diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-compose-logs
          path: test-results/e2e-compose.log
          if-no-files-found: ignore

  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Check formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Initialize development environment
        working-directory: infra/terraform/envs/dev
        run: terraform init -backend=false

      - name: Validate development environment
        working-directory: infra/terraform/envs/dev
        run: terraform validate

      - name: Initialize staging environment
        working-directory: infra/terraform/envs/staging
        run: terraform init -backend=false

      - name: Validate staging environment
        working-directory: infra/terraform/envs/staging
        run: terraform validate
